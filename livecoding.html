<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Coding — Marshall Washington</title>
  <link href="https://fonts.googleapis.com/css2?family=Micro+5&family=Metrophobic&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: white;
      font-family: 'Metrophobic', sans-serif;
      color: black;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #blob-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    nav, main, header, .filters { position: relative; z-index: 1; }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .nav-home {
      font-family: 'Micro 5', monospace;
      font-size: clamp(20px, 3vw, 40px);
      color: black;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .nav-home:hover { opacity: 1; }

    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      font-family: 'Micro 5', monospace;
      font-size: clamp(24px, 3.5vw, 52px);
      color: black;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 0.5; }

    /* ── HEADER ── */
    header {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0.5rem 2rem 1rem;
    }

    header h1 {
      font-family: 'Micro 5', monospace;
      font-size: clamp(48px, 7vw, 96px);
      font-weight: 400;
      line-height: 1;
    }

    header p {
      font-family: 'Metrophobic', sans-serif;
      font-size: clamp(13px, 1.5vw, 16px);
      color: #555;
      margin-top: 0.6rem;
      max-width: 520px;
      line-height: 1.6;
    }

    /* ── FILTER TABS ── */
    .filters {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.25rem 2rem 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'Micro 5', monospace;
      font-size: clamp(18px, 2vw, 28px);
      background: none;
      border: 2px solid black;
      padding: 0.2rem 0.9rem 0.1rem;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      color: black;
      letter-spacing: 0.03em;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: black;
      color: white;
    }

    /* ── GRID ── */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
      columns: 3 280px;
      column-gap: 1.25rem;
    }

    /* ── CARD ── */
    .card {
      break-inside: avoid;
      margin-bottom: 1.25rem;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(0,0,0,0.10);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.45s forwards;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 36px rgba(0,0,0,0.12);
    }

    .card.hidden { display: none; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }

    .card-thumb-placeholder {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    /* live coding specific thumb — animated gradient */
    .card-thumb-lc {
      width: 100%;
      height: 160px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-thumb-lc canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .card-thumb-lc .thumb-label {
      position: relative;
      z-index: 1;
      font-family: 'Micro 5', monospace;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: rgba(0,0,0,0.5);
      background: rgba(255,255,255,0.55);
      padding: 0.2rem 0.6rem;
      backdrop-filter: blur(4px);
    }

    .card-body {
      padding: 0.85rem 1rem 1rem;
    }

    .card-category {
      font-family: 'Micro 5', monospace;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .cat-livecode { color: #3aaa82; }

    .card-title {
      font-family: 'Micro 5', monospace;
      font-size: clamp(18px, 2vw, 26px);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 0.6rem;
    }

    .card-desc {
      font-family: 'Metrophobic', sans-serif;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 0.7rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      font-family: 'Metrophobic', sans-serif;
      font-size: 12px;
      border: 1px solid rgba(0,0,0,0.25);
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      color: #444;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .tag:hover { border-color: black; color: black; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      max-width: 820px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-family: 'Micro 5', monospace;
      font-size: 28px;
      background: none;
      border: none;
      cursor: pointer;
      color: black;
      opacity: 0.5;
      transition: opacity 0.15s;
      z-index: 2;
    }
    .modal-close:hover { opacity: 1; }

    .modal-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .modal-category {
      font-family: 'Micro 5', monospace;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #3aaa82;
      margin-bottom: 0.3rem;
    }

    .modal-title {
      font-family: 'Micro 5', monospace;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .modal-desc {
      font-family: 'Metrophobic', sans-serif;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    .modal-embed {
      width: 100%;
      height: 520px;
      border: none;
      display: block;
    }

    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(0,0,0,0.08);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .modal-footer .tag { font-size: 13px; }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      nav { padding: 1rem 1.25rem; }
      header { padding: 0.5rem 1.25rem 1rem; }
      .filters { padding: 1rem 1.25rem 1.5rem; }
      main { padding: 0 1.25rem 3rem; columns: 1; }
      .modal-embed { height: 380px; }
    }
  </style>
</head>
<body>

  <script>
    // ── ANIMATED THUMB CANVASES ──
    // Each card gets its own mini animated gradient
    const thumbCanvases = document.querySelectorAll('.thumb-canvas');
    const thumbColors = [
      [[0.9,0.95,0.7], [0.6,0.9,0.85]],   // yellow-green pastel
      [[0.85,0.7,0.95],[0.7,0.85,0.95]],   // purple-blue
      [[0.95,0.8,0.85],[0.9,0.95,0.8]],    // pink-mint
    ];

    thumbCanvases.forEach((tc, i) => {
      const parent = tc.parentElement;
      const resize = () => { tc.width = parent.offsetWidth; tc.height = parent.offsetHeight; };
      resize();
      new ResizeObserver(resize).observe(parent);

      const ctx = tc.getContext('2d');
      const cols = thumbColors[i % thumbColors.length];
      let t = 0;

      function drawThumb() {
        const W = tc.width, H = tc.height;
        t += 0.008;
        const x = W * (0.3 + 0.2 * Math.sin(t));
        const y = H * (0.4 + 0.15 * Math.cos(t * 0.7));
        const grad = ctx.createRadialGradient(x, y, 0, W/2, H/2, Math.max(W,H) * 0.8);
        const c0 = cols[0], c1 = cols[1];
        grad.addColorStop(0,   `rgba(${~~(c0[0]*255)},${~~(c0[1]*255)},${~~(c0[2]*255)},0.9)`);
        grad.addColorStop(1,   `rgba(${~~(c1[0]*255)},${~~(c1[1]*255)},${~~(c1[2]*255)},0.6)`);
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,W,H);
        requestAnimationFrame(drawThumb);
      }
      drawThumb();
    });

    // ── FILTER ──
    const btns = document.querySelectorAll('.filter-btn');
    const cards = document.querySelectorAll('.card');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        cards.forEach(c => {
          const show = f === 'all' || c.dataset.cat === f;
          c.classList.toggle('hidden', !show);
        });
      });
    });

    // ── MODAL ──
    const overlay = document.getElementById('modal-overlay');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc  = document.getElementById('modal-desc');
    const modalIframe = document.getElementById('modal-iframe');
    const modalTags  = document.getElementById('modal-tags');
    const modalClose = document.getElementById('modal-close');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        modalTitle.textContent = card.dataset.title;
        modalDesc.textContent  = card.dataset.desc;
        const url = card.dataset.url;
        modalIframe.src = url || 'https://strudel.cc/';
        modalTags.innerHTML = card.dataset.tags.split(',').map(t =>
          `<span class="tag">${t.trim()}</span>`
        ).join('');
        overlay.classList.add('open');
      });
    });

    modalClose.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function closeModal() {
      overlay.classList.remove('open');
      modalIframe.src = '';
    }

    // ── BLOB CANVAS ── (matches portfolio.html exactly)
    const canvas = document.getElementById('blob-canvas');
    const ctx = canvas.getContext('2d');

    const COLORS = [
      { r: 85,  g: 205, b: 252 },
      { r: 85,  g: 205, b: 252 },
      { r: 247, g: 168, b: 184 },
      { r: 247, g: 168, b: 184 },
      { r: 255, g: 255, b: 255 },
    ];

    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    const blobs = COLORS.map((color, i) => ({
      color,
      baseX:   [0.15, 0.75, 0.85, 0.25, 0.5][i],
      baseY:   [0.25, 0.15, 0.7,  0.75, 0.5][i],
      factorX: [ 0.45, -0.35,  0.28, -0.40,  0.20][i],
      factorY: [ 0.40,  0.30, -0.38,  0.35, -0.25][i],
      radius:  [420, 380, 400, 360, 340][i],
      x: 0, y: 0,
    }));

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    blobs.forEach(b => { b.x = b.baseX * window.innerWidth; b.y = b.baseY * window.innerHeight; });

    function lerp(a, b, t) { return a + (b - a) * t; }

    function draw() {
      const W = canvas.width, H = canvas.height;
      const mx = mouse.x / W - 0.5, my = mouse.y / H - 0.5;
      ctx.clearRect(0, 0, W, H);
      blobs.forEach(b => {
        const tx = b.baseX * W + mx * W * b.factorX * 2;
        const ty = b.baseY * H + my * H * b.factorY * 2;
        b.x = lerp(b.x, tx, 0.09);
        b.y = lerp(b.y, ty, 0.09);
        const { r, g } = b.color, blue = b.color.b;
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius);
        grad.addColorStop(0,   `rgba(${r},${g},${blue},0.7)`);
        grad.addColorStop(0.5, `rgba(${r},${g},${blue},0.35)`);
        grad.addColorStop(1,   `rgba(${r},${g},${blue},0)`);
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
